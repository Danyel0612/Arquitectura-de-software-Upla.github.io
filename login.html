<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión – Huaman Ñahui Dany Daniel</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      position: relative; z-index: 1;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.8s ease forwards;
    }
    .login-logo {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-mono);
      font-size: 18px; font-weight: 700; color: #fff;
      margin: 0 auto 1.5rem;
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.6rem; font-weight: 800;
      text-align: center;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }
    .login-sub {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      text-align: center;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .login-link a { color: var(--accent-cyan); text-decoration: none; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">UPLA</div>
      <div class="login-title">Bienvenido</div>
      <div class="login-sub">Portafolio · Arquitectura de Software</div>

      <div class="form-group">
        <label>Usuario</label>
        <input type="text" placeholder="Ingresa tu usuario" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:0.5rem;"
        onclick="alert('Función de login en desarrollo.')">
        Iniciar Sesión
      </button>

      <div class="login-link">
        <a href="../index.html">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
</body>
</html>
